name: Wii U Test-Build

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: Build for Wii U
    runs-on: ubuntu-latest

    steps:
      - name: Readcopy download
        uses: actions/checkout@v4

      - name: 🔨 Executing Buildscript (Docker + devkitPro)
        run: |
          chmod +x build_wiiu.sh
          ./build_wiiu.sh

      - name:  Upload Wuhb to Releases
        uses: actions/upload-artifact@v4
        with:
          name: DDNet-WiiU-Release
          path: build/DDNet.wuhb
